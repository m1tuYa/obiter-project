<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>orbiter</title>
  </head>
  <body>
    <div id="field">
      <canvas id="sky-canvas"></canvas>
      <div id="empty-hint" hidden>
        <div class="hint-line">そのまま打ち始めれば、粒になる</div>
        <div class="hint-link" id="sample-link">例のデータで始める</div>
      </div>
    </div>

    <!-- 選択中の操作(召喚されるグリフ) -->
    <div id="actions" hidden></div>

    <!-- 書く行(打ち始めると浮かび上がる) -->
    <form id="writer" hidden autocomplete="off">
      <div id="writer-context"></div>
      <input id="writer-input" type="text" autocomplete="off" />
    </form>

    <!-- 検索(/で召喚) -->
    <div id="search-overlay" hidden>
      <div id="search-box">
        <input id="search-input" type="text" placeholder="全文検索 — 生死を問わず" autocomplete="off" />
        <div id="search-results"></div>
      </div>
    </div>

    <!-- テーマの尾(右から滑り込む帯) -->
    <div id="band" hidden>
      <div id="band-header">
        <span id="band-title"></span>
        <span id="band-close">esc</span>
      </div>
      <div id="band-list"></div>
    </div>

    <!-- 右上の格納庫 -->
    <div id="corner">
      <div id="corner-toggle">···</div>
      <div id="corner-menu" hidden>
        <div class="corner-item" id="menu-sample">例のデータ</div>
        <div class="corner-item" id="menu-export">書き出し</div>
        <label class="corner-item" for="menu-import">読み込み<input type="file" id="menu-import" accept=".json" hidden /></label>
        <div id="corner-keys">
          <div>打ち始める / Enter = 書く</div>
          <div>/ = 検索</div>
          <div>クリック = 粒に乗る(雲の上に星座)</div>
          <div>乗ったままスワイプ = 星座を渡る</div>
          <div>ドラッグ = 空を回す</div>
          <div>星を星へ落とす = リンク</div>
          <div>星を空へ落とす = 位置調整</div>
          <div>惑星へ落とす / Delete = 閉幕</div>
          <div>彗星 = 選択→グリフ(日付で戻る)</div>
          <div>ホイール = ズーム</div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
